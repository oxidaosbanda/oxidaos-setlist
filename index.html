<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OXIDAOS Setlist</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Oswald',Arial Narrow,sans-serif;background:#0d0d0d;color:#f0f0f0;min-height:100vh;}
/* SETUP */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;text-align:center;}
#setup .logo{width:100px;height:100px;border-radius:50%;border:3px solid #c87d30;overflow:hidden;margin-bottom:20px;}
#setup .logo img{width:100%;height:100%;object-fit:cover;}
#setup h1{font-size:28px;color:#c87d30;letter-spacing:3px;margin-bottom:6px;}
#setup p{font-size:12px;color:#555;margin-bottom:24px;font-style:italic;}
#setup label{font-size:11px;color:#666;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block;}
#setup input{font-family:'Oswald',sans-serif;font-size:14px;background:#1a1a1a;border:1px solid #333;color:#f0f0f0;padding:10px 14px;border-radius:4px;outline:none;width:100%;max-width:340px;margin-bottom:12px;}
#setup input:focus{border-color:#c87d30;}
#setup button{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;padding:10px 28px;border-radius:4px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:1px;background:#c87d30;color:#000;}
#setup .err{font-size:11px;color:#f0997b;margin-top:8px;min-height:16px;}
/* APP */
#app{display:none;}
.toolbar{display:flex;gap:8px;align-items:center;padding:12px 16px;background:#111;border-bottom:1px solid #222;flex-wrap:wrap;}
.toolbar input{font-family:'Oswald',sans-serif;font-size:14px;background:#1a1a1a;border:1px solid #333;color:#f0f0f0;padding:6px 10px;border-radius:4px;outline:none;}
.toolbar input:focus{border-color:#c87d30;}
.tin{flex:1;min-width:140px;}.tnb{width:76px;}
.btn{font-family:'Oswald',sans-serif;font-size:12px;font-weight:700;padding:7px 14px;border-radius:4px;border:none;cursor:pointer;text-transform:uppercase;letter-spacing:1px;}
.ba{background:#c87d30;color:#000;}.ba:hover{background:#e0912e;}
.bsave{background:transparent;color:#5DCAA5;border:1px solid #5DCAA5;}.bsave:hover{background:#5dcaa522;}
.bp{background:transparent;color:#c87d30;border:1px solid #c87d30;}.bp:hover{background:#c87d3022;}
.st{font-size:11px;margin-left:4px;}
.ok{color:#5DCAA5;}.err{color:#f0997b;}.loading{color:#888;}
.page{padding:12px 16px;}
.header{display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:10px;border-bottom:2px solid #c87d30;}
.lw{width:46px;height:46px;border-radius:50%;overflow:hidden;flex-shrink:0;border:2px solid #c87d30;}
.lw img{width:100%;height:100%;object-fit:cover;}
.bi{flex:1;}.bi h1{font-size:20px;font-weight:700;color:#c87d30;letter-spacing:2px;text-transform:uppercase;line-height:1;}
.bi p{font-size:9px;color:#555;font-style:italic;margin-top:2px;}
.bolo-box{text-align:right;}.bolo-label{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}
.bolo-inp{font-family:'Oswald',sans-serif;font-size:14px;font-weight:700;text-align:right;color:#f0f0f0;background:transparent;border:none;border-bottom:1.5px solid #c87d30;outline:none;width:180px;padding:1px 2px;}
.bolo-inp::placeholder{color:#333;font-weight:400;}
.hint{font-size:10px;color:#333;margin:4px 0 10px;}
table{width:100%;border-collapse:collapse;}
td{padding:4px 5px;border-bottom:1px solid #1a1a1a;vertical-align:middle;}
tr.sr:hover td{background:#161616;}
tr.dragging{opacity:0.3;}
tr.drag-over td{border-top:2px solid #c87d30;}
.tn{width:28px;text-align:right;font-size:11px;color:#444;cursor:grab;user-select:none;padding-right:6px;}
.tm{font-size:18px;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;}
.ne{font-family:'Oswald',sans-serif;font-size:18px;font-weight:700;text-transform:uppercase;background:transparent;border:none;border-bottom:1px solid #c87d30;color:#f0f0f0;outline:none;width:100%;}
.tb{width:72px;text-align:right;}
.bv{font-size:13px;font-weight:700;cursor:pointer;padding:2px 6px;border-radius:3px;display:inline-block;}.bv:hover{background:#1a1a1a;}
.bf{color:#f0997b;}.bm{color:#EF9F27;}.bsl{color:#5DCAA5;}.bn{color:#444;border:1px dashed #2a2a2a;border-radius:3px;font-size:11px;}
.be{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;width:62px;text-align:center;background:#1a1a1a;border:1px solid #c87d30;color:#f0f0f0;border-radius:3px;padding:2px 4px;outline:none;}
.td-del{width:26px;text-align:center;}
.db{background:none;border:none;color:#2a2a2a;cursor:pointer;font-size:17px;line-height:1;padding:0;}.db:hover{color:#c0392b;}
.sc-wrap{margin-top:14px;}
.sc-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#444;margin-bottom:5px;border-top:1px solid #c87d30;padding-top:8px;}
.sc-nm{font-family:'Oswald',sans-serif;font-size:15px;font-weight:700;text-transform:uppercase;color:#f0f0f0;background:transparent;border:none;border-bottom:1px solid #222;outline:none;width:100%;}.sc-nm:focus{border-bottom-color:#c87d30;}
.sc-bpm{font-family:'Oswald',sans-serif;font-size:13px;font-weight:700;width:62px;text-align:center;background:transparent;border:none;border-bottom:1px solid #222;color:#444;outline:none;}.sc-bpm:focus{border-bottom-color:#c87d30;color:#f0f0f0;}
@page{size:A4 portrait;margin:8mm;}
@media print{
  body{background:#fff;color:#111;}
  .toolbar,.db,.hint,#setup{display:none!important;}
  .td-del{display:none!important;}
  .bi h1{color:#c87d30;}.bolo-inp{color:#111;}
  td{border-bottom-color:#eee;}
  tr.sr:hover td{background:none;}
  .tm{color:#111;}.tn{color:#bbb;}
  .bf{color:#993c1d;}.bm{color:#854f0b;}.bsl{color:#0f6e56;}
  .sc-title{color:#aaa;border-top-color:#c87d30;}
  .sc-nm{color:#111;border-bottom-color:#eee;}.sc-bpm{color:#aaa;border-bottom-color:#eee;}
}
</style>
</head>

        <tr><td style="width:28px;text-align:right;font-size:11px;color:#444;padding-right:6px;">2</td><td><input class="sc-nm" type="text" placeholder="Cancion..." /></td><td style="width:72px;text-align:right;"><input class="sc-bpm" type="number" placeholder="BPM" /></td><td style="width:26px;"></td></tr>
      </tbody></table>
    </div>
  </div>
</div>

<script>
var REPO='oxidaosbanda/oxidaos-setlist';
var songs=[], nextId=38, dragSrc=null, _k='';

function setSt(msg,cls){var s=document.getElementById('st');s.textContent=msg;s.className='st '+(cls||'');}

async function acceder(){
  var tk=document.getElementById('tk').value.trim();
  if(!tk){document.getElementById('setup-err').textContent='Introduce el codigo';return;}
  document.getElementById('setup-err').textContent='Verificando...';
  try{
    var r=await fetch('https://api.github.com/repos/'+REPO+'/contents/setlist.json',
      {headers:{'Authorization':'Bearer '+tk,'Accept':'application/vnd.github+json'}});
    if(!r.ok){document.getElementById('setup-err').textContent='Codigo incorrecto';return;}
    localStorage.setItem('ox_k',tk);
    _k=tk;
    iniciar();
  }catch(e){document.getElementById('setup-err').textContent='Error de conexion';}
}

async function iniciar(){
  document.getElementById('setup').style.display='none';
  document.getElementById('app').style.display='block';
  await cargar();
}

async function cargar(){
  setSt('Cargando...','loading');
  try{
    var r=await fetch('https://raw.githubusercontent.com/'+REPO+'/main/setlist.json?t='+Date.now());
    var d=await r.json();
    songs=d.songs||[];nextId=d.nextId||38;render();setSt('','');
  }catch(e){setSt('Error al cargar','err');}
}

async function guardar(){
  setSt('Guardando...','loading');
  try{
    var r=await fetch('https://api.github.com/repos/'+REPO+'/contents/setlist.json',
      {headers:{'Authorization':'Bearer '+_k,'Accept':'application/vnd.github+json'}});
    var meta=await r.json();
    var content=JSON.stringify({songs:songs,nextId:nextId},null,2);
    var encoded=btoa(unescape(encodeURIComponent(content)));
    var res=await fetch('https://api.github.com/repos/'+REPO+'/contents/setlist.json',{
      method:'PUT',
      headers:{'Authorization':'Bearer '+_k,'Accept':'application/vnd.github+json','Content-Type':'application/json'},
      body:JSON.stringify({message:'Actualizar setlist',content:encoded,sha:meta.sha})
    });
    if(res.ok){setSt('Guardado','ok');setTimeout(function(){setSt('','');},2000);}
    else{setSt('Error al guardar','err');}
  }catch(e){setSt('Error: '+e.message,'err');}
}

function bc(b){if(!b)return'bn';if(b>140)return'bf';if(b>=90)return'bm';return'bsl';}
function render(){
  var tb=document.getElementById('tb');tb.innerHTML='';
  songs.forEach(function(s,i){
    var tr=document.createElement('tr');tr.className='sr';tr.draggable=true;
    var bhtml=s.bpm?'<span class="bv '+bc(s.bpm)+'" onclick="editBpm(this,'+s.id+')">'+s.bpm+'</span>':'<span class="bv bn" onclick="editBpm(this,'+s.id+')">+ bpm</span>';
    tr.innerHTML='<td class="tn">&#8801; '+(i+1)+'</td><td class="tm" ondblclick="editName(this,'+s.id+')">'+s.name+'</td><td class="tb">'+bhtml+'</td><td class="td-del"><button class="db" onclick="del('+s.id+')">&#215;</button></td>';
    tr.addEventListener('dragstart',function(e){dragSrc=s.id;setTimeout(function(){tr.classList.add('dragging');},0);e.dataTransfer.effectAllowed='move';});
    tr.addEventListener('dragend',function(){tr.classList.remove('dragging');});
    tr.addEventListener('dragover',function(e){e.preventDefault();tr.classList.add('drag-over');});
    tr.addEventListener('dragleave',function(){tr.classList.remove('drag-over');});
    tr.addEventListener('drop',function(e){e.preventDefault();tr.classList.remove('drag-over');if(dragSrc===s.id)return;var fi=songs.findIndex(function(x){return x.id===dragSrc;});var ti=songs.findIndex(function(x){return x.id===s.id;});var m=songs.splice(fi,1)[0];songs.splice(ti,0,m);render();});
    tb.appendChild(tr);
  });
}
function editName(td,id){var s=songs.find(function(x){return x.id===id;});var inp=document.createElement('input');inp.className='ne';inp.value=s.name;td.innerHTML='';td.appendChild(inp);inp.focus();inp.select();inp.addEventListener('blur',function(){s.name=inp.value.trim()||s.name;render();});inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();});}
function editBpm(span,id){var s=songs.find(function(x){return x.id===id;});var inp=document.createElement('input');inp.type='number';inp.className='be';inp.value=s.bpm||'';inp.placeholder='BPM';inp.min=40;inp.max=300;span.replaceWith(inp);inp.focus();inp.select();inp.addEventListener('blur',function(){s.bpm=parseInt(inp.value)||null;render();});inp.addEventListener('keydown',function(e){if(e.key==='Enter')inp.blur();if(e.key==='Escape')render();});}
function del(id){songs=songs.filter(function(s){return s.id!==id;});render();}
function addSong(){var n=document.getElementById('nn').value.trim();var b=parseInt(document.getElementById('nb').value)||null;if(!n){document.getElementById('nn').focus();return;}songs.push({id:nextId++,name:n,bpm:b});document.getElementById('nn').value='';document.getElementById('nb').value='';document.getElementById('nn').focus();render();}
document.getElementById('nn').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('nb').focus();});
document.getElementById('nb').addEventListener('keydown',function(e){if(e.key==='Enter')addSong();});
document.getElementById('tk').addEventListener('keydown',function(e){if(e.key==='Enter')acceder();});

// Auto-login si ya tiene el codigo guardado
var saved=localStorage.getItem('ox_k');
if(saved){_k=saved;iniciar();}
</script>
</body>
</html>
